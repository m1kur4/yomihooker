      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>

    <filter id="shadow" x="0" y="0" width="256" height="256" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)"/>

  <!-- Speech bubble -->
  <g filter="url(#shadow)">
    <path
      d="M70 64C70 53.5066 78.5066 45 89 45H167C177.493 45 186 53.5066 186 64V133C186 143.493 177.493 152 167 152H122L95 177C91.246 180.475 85.2 177.812 85.2 172.7V152H89C78.5066 152 70 143.493 70 133V64Z"
