    />
  </g>

  <!-- Subtle hook -->
  <path
    d="M174 83C191 83 203 95 203 111C203 128 190 141 172 141H146"
    stroke="url(#accent)"
    stroke-width="12"
    stroke-linecap="round"
  />
  <path
    d="M146 141L162 125"
    stroke="url(#accent)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Japanese character feel -->
  <text
    x="128"
    y="124"
    text-anchor="middle"
    dominant-baseline="middle"
