<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#182338"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>

    <linearGradient id="bubble" x1="64" y1="56" x2="188" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#DDEBFF"/>
    </linearGradient>

    <linearGradient id="accent" x1="150" y1="86" x2="214" y2="170" gradientUnits="userSpaceOnUse">
